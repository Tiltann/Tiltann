name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["master", "main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: 
      name: production
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: Ran-git0/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ran-git0
          filename: metrics.svg

          # your custom template
          template: ran-terminal
          base: header, metadata

          # steam
          plugin_steam: yes
          plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          plugin_steam_user: "YOUR_STEAM_ID_64"
          plugin_steam_sections: player, most-played, recently-played
          plugin_steam_games_limit: 2
          plugin_steam_recent_games_limit: 2
          plugin_steam_achievements_limit: 3

          # languages activity
          plugin_languages: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8

          # github activity
          plugin_activity: yes
          plugin_activity_limit: 6
          plugin_activity_days: 14

          # starred topics
          plugin_topics: yes
          plugin_topics_mode: starred
          plugin_topics_sort: starred
          plugin_topics_limit: 12

          # gists
          plugin_gists: yes

          # introduction
          plugin_introduction: yes
          plugin_introduction_title: no
